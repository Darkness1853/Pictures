name: Add contributors
on:
  schedule:
    - cron: '20 20 * * *'  # Запускается раз в сутки
  push:
    branches: [ "main", "master" ]  # Запускается при пуше в main или master

jobs:
  add-contributors:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: BobAnkh/add-contributors@master
      with:
        REPO_NAME: 'Darkness1853/Pictures'   # ⚠️ ЗАМЕНИТЕ на ваше имя/репозиторий
        CONTRIBUTOR: '### Contributors'      # Заголовок, под который вставится таблица
        COLUMN_PER_ROW: '6'
        ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        IMG_WIDTH: '100'
        FONT_SIZE: '14'
        PATH: '/README.md'
        COMMIT_MESSAGE: 'docs(README): update contributors'
        AVATAR_SHAPE: 'round'                # <-- ЭТО ДЕЛАЕТ АВАТАРКИ КРУГЛЫМИ
